<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Price List</title>
    <style>
        :root {
            --primary-color: #111111;
            --accent-color: #d4af37; /* Gold accent */
            --bg-color: #f9f9f9;
            --text-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* Search Bar Styling */
        .search-container {
            margin: 20px 0;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s ease;
        }

        #searchInput:focus {
            border-color: var(--accent-color);
        }

        /* Table Styling */
        .table-container {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: var(--primary-color);
            color: #fff;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: #fcfcfc;
        }

        .price-tag {
            font-weight: bold;
            color: var(--primary-color);
        }

        /* Loader & Error State */
        .loading, .error-msg {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>WHOLESALE STOCK LIST</h1>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search for your favorite perfume..." autocomplete="off">
    </div>

    <div class="table-container">
        <div id="loading" class="loading">Loading live prices...</div>
        <table id="priceTable" style="display: none;">
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Code</th>
                    <th>Quantity</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // PASTE YOUR GOOGLE SHEET CSV URL HERE
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQMHrfuuQagZQNnWLcrzEWzzMijnAXb67UmFbCgShPiafkyrr_qf5s8I59p4iWhHVdxWgSJg2eYW6Tg/pub?gid=0&single=true&output=csv';

    let masterData = [];

    // 1. Fetch CSV Data from Google Sheets
    async function fetchPrices() {
        try {
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.text();
            
            masterData = parseCSV(data);
            renderTable(masterData);
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('priceTable').style.display = 'table';
        } catch (error) {
            console.error('Error fetching data:', error);
            document.getElementById('loading').innerHTML = `<span style="color: red;">Failed to load prices. Please refresh or try again later.</span>`;
        }
    }

    // 2. Simple, robust CSV Parser
    function parseCSV(text) {
        const lines = text.split('\n');
        const result = [];
        
        // Skip header row (i=1 instead of 0)
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue; // Skip empty rows
            
            // Regex to handle potential commas inside quotes safely
            const matches = lines[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || lines[i].split(',');
            
            if (matches.length >= 3) {
                const name = matches[0];
                const size = matches[1].replace(/"/g, '').trim();
                const price = matches[2].replace(/"/g, '').trim();
                
                result.push({ name, size, price });
            }
        }
        return result;
    }

    // 3. Render rows into the table HTML
    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ''; // Clear existing rows

        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#999;">No matching items found.</td></tr>`;
            return;
        }

        data.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${item.name}</strong></td>
                <td>${item.size}</td>
                <td class="price-tag">${item.price}</td>
            `;
            tbody.appendChild(row);
        });
    }

    // 4. Real-time Search Filter Event Listener
    document.getElementById('searchInput').addEventListener('input', function(e) {
        const searchTerm = e.target.value.toLowerCase().trim();
        
        // Filter master array based on search input matching product names
        const filteredData = masterData.filter(item => {
            return item.name.toLowerCase().includes(searchTerm);
        });
        
        renderTable(filteredData);
    });

    // Initialize on page load
    window.addEventListener('DOMContentLoaded', fetchPrices);
</script>

</body>
</html>
