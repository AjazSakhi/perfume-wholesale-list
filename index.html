<!DOCTYPE html>
<html>
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HQKVD4TWJC"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-HQKVD4TWJC');
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaliya Perfume Price Finder</title>
    <style>
        :root { 
            --primary: #27ae60; 
            --wa-green: #4169E1; 
            --bg: #f0f2f5; 
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            padding: 20px; 
            margin: 0;
        }
        .box { 
            max-width: 450px; 
            margin: 20px auto; 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        h2 { color: #1a1a1a; margin-top: 0; margin-bottom: 20px; text-align: center; }

        .search-container { position: relative; width: 100%; margin-bottom: 20px; }

        #search { 
            width: 100%; 
            padding: 15px 45px 15px 15px; 
            border: 2px solid #eee; 
            border-radius: 10px; 
            font-size: 16px; 
            outline: none; 
            transition: 0.3s;
            box-sizing: border-box; 
        }
        #search:focus { border-color: var(--primary); }

        .clear-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: #ccc;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            text-align: center;
            line-height: 18px;
            cursor: pointer;
            font-weight: bold;
            display: none; 
            font-size: 12px;
            user-select: none;
        }

        .item { 
            display: none; 
            background: #fff;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            text-align: left;
            flex-direction: column;
            gap: 10px;
            transition: transform 0.2s;
        }
        .item:hover { transform: translateY(-2px); border-color: #ddd; }
        
        .info-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .name { font-weight: 600; color: #333; font-size: 1.05em; }
        .price { font-weight: bold; color: var(--primary); font-size: 1.1em; }
        
        .wa-btn {
            background-color: var(--wa-green);
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            display: block;
            text-align: center;
            transition: background 0.3s;
        }
        .wa-btn:hover { background-color: #1eb954; }
        
        .show { display: flex !important; }
    </style>
</head>
<body>

<div class="box">
    <h2>Aaliya Luxury Perfume</h2>
    
    <div class="search-container">
        <input type="text" id="search" placeholder="CHECK WHOLESALE STOCK..." onkeyup="filter()">
        <span class="clear-btn" id="clearBtn" onclick="clearSearch()">&times;</span>
    </div>
    
    <div id="list">WHOLESALE from Aaliya Luxury Perfume.</div>
</div>

<script>
    const yourWhatsAppNumber = "919722999223"; 
    const sheetUrl = '    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQMHrfuuQagZQNnWLcrzEWzzMijnAXb67UmFbCgShPiafkyrr_qf5s8I59p4iWhHVdxWgSJg2eYW6Tg/pub?gid=0&single=true&output=csv';';

    let searchTimer;

    // 1. Fetch data from Google Sheets
    fetch(sheetUrl)
        .then(res => res.text())
        .then(csvText => {
            const rows = csvText.split('\n').slice(1);
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = ''; 

            rows.forEach(row => {
                const cols = row.split(',');
                if (cols.length >= 2) {
                    const name = cols[0].trim();
                    const price = cols[1].trim();
                    
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'item';
                    
                    const message = encodeURIComponent(`please send payment option for my perfume ${name} and ${price}.`);
                    const waLink = `https://wa.me/${yourWhatsAppNumber}?text=${message}`;

                    itemDiv.innerHTML = `
                        <div class="info-row">
                            <span class="name">${name}</span>
                            <span class="price">₹${price}</span>
                        </div>
                        <a href="${waLink}" class="wa-btn" target="_blank">WhatsApp 97 22 999 22 3 for the best price.</a>
                    `;
                    listDiv.appendChild(itemDiv);
                }
            });
        });

    // 2. Filter logic with Analytics Tracking
    function filter() {
        let input = document.getElementById('search').value.toLowerCase().trim();
        let items = document.getElementsByClassName('item');
        let clearBtn = document.getElementById('clearBtn');

        clearBtn.style.display = (input.length > 0) ? "block" : "none";

        // ANALYTICS: Track what people search for after 1 second of no typing
        clearTimeout(searchTimer);
        if (input.length >= 3) {
            searchTimer = setTimeout(() => {
                gtag('event', 'search_perfume', {
                    'search_term': input
                });
            }, 1000);
        }
        
        for (let i = 0; i < items.length; i++) {
            let text = items[i].innerText.toLowerCase();
            if (input !== "" && text.includes(input)) {
                items[i].classList.add('show');
            } else {
                items[i].classList.remove('show');
            }
        }
    }

    // 3. Clear Search Function
    function clearSearch() {
        document.getElementById('search').value = "";
        filter();
        document.getElementById('search').focus();
    }
</script>

</body>
</html>
